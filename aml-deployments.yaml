    matchLabels:
      app: alert-manager
  template:
    metadata:
      labels:
        app: alert-manager
    spec:
      containers:
      - name: alert-manager
        image: amlacrayo.azurecr.io/alert-manager:v1
        ports:
        - containerPort: 8005
        env:
        - name: SERVICE_BUS_CONNECTION_STR
          valueFrom:
            secretKeyRef:
              name: service-bus-secret
              key: connection-string
        - name: OPENAI_API_KEY
          valueFrom:

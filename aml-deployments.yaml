---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: aml-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: amlacrayo.azurecr.io/gateway:v1
        ports:
        - containerPort: 8000
        env:
        - name: INGESTION_SERVICE_URL
          value: "http://ingestion:8001"
        - name: ALERT_MANAGER_URL
          value: "http://alert-manager:8005"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret-key
        - name: ALLOWED_ORIGINS
          value: "https://*.streamlit.app,http://localhost:8501"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: api-key
        - name: LOG_LEVEL
          value: "INFO"
      imagePullSecrets:
      - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: aml-system
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: LoadBalancer

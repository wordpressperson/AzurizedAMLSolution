apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: aml-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
      - name: ingestion
        image: amlacrayo.azurecr.io/ingestion:v1
        ports:
        - containerPort: 8001
        env:
        - name: SERVICE_BUS_CONNECTION_STR
          valueFrom:
            secretKeyRef:
              name: service-bus-secret
              key: connection-string
        - name: LOG_LEVEL
          value: "INFO"
      imagePullSecrets:
      - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: aml-system
spec:
  selector:
    app: ingestion
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---
